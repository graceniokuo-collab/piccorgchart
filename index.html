<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Org Chart</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --surface2: #e8ebf5;
    --border: #d0d5e8;
    --text: #1e2240;
    --text-muted: #7b82a8;
    --accent: #4f7cff;
    --accent-glow: rgba(79,124,255,0.12);
    --red: #e8294a;
    --red-bg: rgba(232,41,74,0.08);
    --red-border: rgba(232,41,74,0.35);
    --pink: #1a7a4a;
    --pink-bg: rgba(34,180,100,0.1);
    --pink-border: rgba(26,122,74,0.45);
    --connector: #8892bb;
    --node-w: 130px;
    --node-h: 52px;
    --gap-x: 18px;
    --gap-y: 48px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(240,242,248,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 12px 24px;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }

  .legend-dot.manager { background: var(--red); }
  .legend-dot.techlead { background: #22b464; }
  .legend-dot.regular { background: var(--accent); border: 1px solid rgba(79,124,255,0.5); }

  .controls {
    display: flex;
    gap: 8px;
  }

  button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }

  button:hover {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }

  #canvas-wrap {
    position: fixed;
    top: 53px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }

  #canvas-wrap.dragging { cursor: grabbing; }

  #scene {
    position: absolute;
    transform-origin: 0 0;
  }

  #scene svg.connectors {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    overflow: visible;
  }

  .node {
    position: absolute;
    width: var(--node-w);
    height: var(--node-h);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
    padding: 6px 8px;
    text-align: center;
  }

  .node:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    border-color: var(--accent);
    z-index: 10;
  }

  .node.manager {
    background: var(--red-bg);
    border-color: var(--red-border);
  }

  .node.manager:hover {
    border-color: var(--red);
    box-shadow: 0 8px 24px rgba(255,77,109,0.2);
  }

  .node.techlead {
    background: var(--pink-bg);
    border-color: var(--pink-border);
  }

  .node.techlead:hover {
    border-color: var(--pink);
    box-shadow: 0 8px 24px rgba(255,179,198,0.2);
  }

  .node-name {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 112px;
  }

  .node.manager .node-name { color: #c0122e; }
  .node.manager .node-role { color: rgba(192,18,46,0.7); }

  .node.techlead .node-name { color: var(--pink); }
  .node.techlead .node-role { color: rgba(26,122,74,0.75); }

  .node-role {
    font-size: 9.5px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 112px;
  }

  .node-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    width: 10px;
    height: 10px;
    background: var(--red);
    border-radius: 50%;
    border: 2px solid var(--bg);
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    z-index: 200;
    display: none;
    max-width: 200px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  #tooltip .tt-name {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 4px;
  }

  #tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    color: var(--text-muted);
    font-size: 11px;
    margin-top: 2px;
  }

  #tooltip .tt-val { color: var(--text); }

  path.connector {
    fill: none;
    stroke: var(--connector);
    stroke-width: 2;
  }
</style>
</head>

<header>
  <h1>Team Org Chart</h1>
  <div class="legend">

    <div class="legend-item"><div class="legend-dot regular"></div> Team Member</div>
  </div>
  <div class="controls">
    <button id="btn-fit">Fit View</button>
    <button id="btn-in">＋ Zoom</button>
    <button id="btn-out">－ Zoom</button>
  </div>
</header>

<div id="canvas-wrap">

// Build children map
const children = {};

});
RAW.forEach(r => {
  if (r.coach && byName[r.coach]) {
    children[r.coach].push(r.name);

});

// Sort children to group related functions together
// Priority order for function grouping (lower = left side)
function fnPriority(name, parent) {
  const node = byName[name];
  if (!node) return 99;
  const fn = node.fn || '';

  // Under Russ: explicit left-to-right order
  // Jocelin (leftmost) → YY → Landice → Weihang → Eason → Maso → Anny → Brad → Simon → Vivi (rightmost)
  if (parent === 'Russ') {
    if (name === 'Jocelin Ho')   return 0;
    if (name === 'YY')           return 1;
    if (name === 'Landice')      return 2;
    if (name === 'Weihang')      return 3;
    if (name === 'Eason')        return 4;
    if (name === 'Maso')         return 5;
    if (name === 'Anny')         return 6;
    if (name === 'Brad')         return 7;
    if (name === 'Simon')        return 8;
    if (name === 'Vivi')         return 99; // very right
    return 50;
  }

  // Under John: explicit left-to-right order
  // Grace Chen (very left) → Angela → Filipe → Chris → Yu-Tang → Russ → Jaime → Joanne → Ching-Mei → ... → Jessie (very right)
  if (parent === 'John') {
    if (name === 'Grace Chen')   return 0;
    if (name === 'Angela')       return 1;
    if (name === 'Filipe')       return 2;
    if (name === 'Chris')        return 3;
    if (name === 'Yu-Tang')      return 4;
    if (fn === 'Engineering')    return 5;  // Russ
    if (fn.startsWith('Dev'))    return 6;  // Jaime
    if (name === 'Joanne')       return 7;  // next to Jaime
    if (name === 'Ching-Mei')    return 8;  // next to Joanne
    if (fn === 'Other')          return 9;
    if (fn === 'Operations' && name !== 'Jessie') return 10;
    if (name === 'Jessie')       return 99; // very right
    return 50;
  }

  // Under Chris: Delphine (very left) → other non-Way → Way (very right)
  if (parent === 'Chris') {
    if (name === 'Delphine')     return 0;  // very left
    if (name === 'Way')          return 99; // very right
    return 5; // everyone else in the middle
  }

  // General priority (lower = left)
  if (fn === 'Engineering')        return 0;  // Russ
  if (fn.startsWith('Dev'))        return 1;  // Jaime (Frontend) adjacent to Russ
  if (fn === 'MLAD')               return 2;
  if (fn === 'Product Management') return 3;
  if (fn === 'Product Design')     return 4;
  if (fn === 'Visual Design')      return 5;
  if (fn === 'Marketing')          return 6;
  if (fn === 'Users')              return 7;
  if (fn === 'Operations')         return 8;
  return 9;
}

Object.keys(children).forEach(parent => {
  children[parent].sort((a, b) => fnPriority(a, parent) - fnPriority(b, parent));
});

// Layout: recursive Reingold-Tilford-like
const NW = 130, NH = 52, GAP_X = 18, GAP_Y = 56;

function subtreeWidth(name) {
  const kids = children[name] || [];
  if (kids.length === 0) return NW;
  const totalKids = kids.reduce((s, k) => s + subtreeWidth(k), 0) + GAP_X * (kids.length - 1);
  return Math.max(NW, totalKids);
}

const positions = {};
function layout(name, x, y) {
  const kids = children[name] || [];
  const sw = subtreeWidth(name);
  positions[name] = { x: x + sw / 2 - NW / 2, y };
  if (kids.length === 0) return;
  let cx = x;
  kids.forEach(k => {
    const ksw = subtreeWidth(k);
    layout(k, cx, y + NH + GAP_Y);
    cx += ksw + GAP_X;
  });
}

// Find roots (coach is null OR coach not in byName)
const roots = RAW.filter(r => !r.coach || !byName[r.coach]).map(r => r.name);

// Place roots side by side
let rx = 0;
roots.forEach(r => {
  layout(r, rx, 0);
  rx += subtreeWidth(r) + GAP_X * 2;
});

const tooltip = document.getElementById('tooltip');

const allNames = Object.keys(positions);
let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
allNames.forEach(n => {
  const p = positions[n];
  minX = Math.min(minX, p.x);
  minY = Math.min(minY, p.y);
  maxX = Math.max(maxX, p.x + NW);
  maxY = Math.max(maxY, p.y + NH);
});

const PAD = 60;
const totalW = maxX - minX + PAD * 2;
const totalH = maxY - minY + PAD * 2;

canvas.style.width = totalW + 'px';
canvas.style.height = totalH + 'px';
svgEl.style.width = totalW + 'px';
svgEl.style.height = totalH + 'px';

// Draw connectors
const pathData = [];
allNames.forEach(name => {
  const kids = children[name] || [];
  const p = positions[name];
  const px = p.x - minX + PAD;
  const py = p.y - minY + PAD;
  kids.forEach(k => {
    const cp = positions[k];
    const cx2 = cp.x - minX + PAD;
    const cy2 = cp.y - minY + PAD;
    const x1 = px + NW / 2;
    const y1 = py + NH;
    const x2 = cx2 + NW / 2;
    const y2 = cy2;
    const midY = (y1 + y2) / 2;
    pathData.push(`M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`);
  });
});

svgEl.innerHTML = pathData.map(d => `<path class="connector" d="${d}"/>`).join('');

// Draw nodes
allNames.forEach(name => {
  const node = RAW.find(r => r.name === name);
  if (!node) return;
  const p = positions[name];
  const isManager = MANAGERS.has(name);
  const isTechLead = TECH_LEADS.has(name);

  const div = document.createElement('div');
  div.className = 'node' + (isManager ? ' manager' : isTechLead ? ' techlead' : '');
  div.style.left = (p.x - minX + PAD) + 'px';
  div.style.top = (p.y - minY + PAD) + 'px';

  div.innerHTML = `
    <div class="node-name">${name}</div>
    <div class="node-role">${node.fn}</div>
    ${isManager ? '<div class="node-badge"></div>' : ''}
  `;

  div.addEventListener('mouseenter', e => {
    const numReports = (children[name] || []).length;
    tooltip.style.display = 'block';
    tooltip.innerHTML = `
      <div class="tt-name">${name}${isManager ? ' 🔴' : isTechLead ? ' 🩷' : ''}</div>
      <div class="tt-row"><span>Function</span><span class="tt-val">${node.fn}</span></div>
      <div class="tt-row"><span>Effort</span><span class="tt-val">${node.effort}</span></div>
      ${isTechLead ? `<div class="tt-row"><span>Role</span><span class="tt-val" style="color:var(--pink)">Tech Lead</span></div>` : ''}
      <div class="tt-row"><span>Reports</span><span class="tt-val">${numReports}</span></div>
      ${node.coach ? `<div class="tt-row"><span>Coach</span><span class="tt-val">${node.coach}</span></div>` : ''}
    `;
  });
  div.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  });
  div.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

  canvas.appendChild(div);
});

// Pan & zoom
const wrap = document.getElementById('canvas-wrap');
const scene = document.getElementById('scene');
let scale = 1, tx = 40, ty = 20;
let dragging = false, lastX, lastY;

// Smooth zoom state
let targetScale = scale, targetTx = tx, targetTy = ty;
let animating = false;

function lerp(a, b, t) { return a + (b - a) * t; }

function animate() {
  const ease = 0.12;
  scale = lerp(scale, targetScale, ease);
  tx = lerp(tx, targetTx, ease);
  ty = lerp(ty, targetTy, ease);
  scene.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  if (Math.abs(scale - targetScale) > 0.0005 || Math.abs(tx - targetTx) > 0.3 || Math.abs(ty - targetTy) > 0.3) {
    requestAnimationFrame(animate);
  } else {
    scale = targetScale; tx = targetTx; ty = targetTy;
    scene.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    animating = false;
  }
}

function startAnimate() {
  if (!animating) { animating = true; requestAnimationFrame(animate); }
}

wrap.addEventListener('mousedown', e => {
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
  wrap.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  tx += dx; ty += dy; targetTx += dx; targetTy += dy;
  lastX = e.clientX; lastY = e.clientY;
  scene.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
});
window.addEventListener('mouseup', () => { dragging = false; wrap.classList.remove('dragging'); });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY < 0 ? 1.08 : 0.93;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const newScale = Math.max(0.08, Math.min(3, targetScale * zoomFactor));
  const scaleRatio = newScale / targetScale;
  targetTx = mx - (mx - targetTx) * scaleRatio;
  targetTy = my - (my - targetTy) * scaleRatio;
  targetScale = newScale;
  startAnimate();
}, { passive: false });

// Touch support
let lastTouchDist = null;
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }
}, { passive: true });
wrap.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    const dx = e.touches[0].clientX - lastX;
    const dy = e.touches[0].clientY - lastY;
    tx += dx; ty += dy; targetTx += dx; targetTy += dy;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    scene.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  }
}, { passive: true });
wrap.addEventListener('touchend', () => { dragging = false; lastTouchDist = null; });

// Fit view
function fitView() {
  const ww = wrap.clientWidth;
  const wh = wrap.clientHeight;
  const s = Math.min(ww / totalW, wh / totalH) * 0.9;
  targetScale = s;
  targetTx = (ww - totalW * s) / 2;
  targetTy = (wh - totalH * s) / 2;
  startAnimate();
}

document.getElementById('btn-fit').addEventListener('click', fitView);
document.getElementById('btn-in').addEventListener('click', () => {
  const rect = wrap.getBoundingClientRect();
  const mx = rect.width / 2, my = rect.height / 2;
  const newScale = Math.min(3, targetScale * 1.3);
  const scaleRatio = newScale / targetScale;
  targetTx = mx - (mx - targetTx) * scaleRatio;
  targetTy = my - (my - targetTy) * scaleRatio;
  targetScale = newScale;
  startAnimate();
});
document.getElementById('btn-out').addEventListener('click', () => {
  const rect = wrap.getBoundingClientRect();
  const mx = rect.width / 2, my = rect.height / 2;
  const newScale = Math.max(0.08, targetScale / 1.3);
  const scaleRatio = newScale / targetScale;
  targetTx = mx - (mx - targetTx) * scaleRatio;
  targetTy = my - (my - targetTy) * scaleRatio;
  targetScale = newScale;
  startAnimate();
});

fitView();
</script>
</body>
</html>
